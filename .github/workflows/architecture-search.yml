name: Architecture Search (Weekly)

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2 AM (weekly)
  workflow_dispatch:

jobs:
  nas:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Longer for architecture search
    permissions:
      contents: write
    
    strategy:
      matrix:
        architecture_type: ['wider', 'deeper', 'bottleneck']
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        lfs: false  # Don't need full database for NAS
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run architecture search
      run: |
        python -c "
import sys
sys.path.insert(0, '.')
from architecture_search import NeuralArchitectureSearch
from train import SelfImprovingModel
import torch
import numpy as np

nas = NeuralArchitectureSearch()
nas.load_search_state()

base_arch = [64, 128, 64]
candidates = nas.generate_candidate_architectures(base_arch, n_candidates=3)

for name, arch in candidates:
    if name == '${{ matrix.architecture_type }}':
        print(f'Testing {name}: {arch}')
        model = SelfImprovingModel(hidden_sizes=arch)
        
        # Quick synthetic evaluation
        X = torch.randn(100, 10)
        y = torch.randn(100, 1)
        
        criterion = torch.nn.MSELoss()
        with torch.no_grad():
            pred = model(X)
            loss = criterion(pred, y).item()
        
        nas.evaluate_architecture(arch, {'val_loss': loss})
        print(f'Score: {loss:.4f}')

nas.save_search_state()
print(f'Best architecture so far: {nas.get_best_architecture()}')
"
    
    - name: Commit NAS results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add nas_state.json || true
        git diff --staged --quiet || git commit -m "NAS: Evaluated ${{ matrix.architecture_type }} [$(date +'%Y-%m-%d')]" || true
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
