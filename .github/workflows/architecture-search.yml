name: Architecture Search (Weekly)

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  nas:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    
    strategy:
      matrix:
        architecture_type: ['wider', 'deeper', 'bottleneck']
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        lfs: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run architecture search
      env:
        ARCH_TYPE: ${{ matrix.architecture_type }}
      run: python scripts/nas_eval.py
    
    - name: Commit NAS results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add nas_state.json || true
        git diff --staged --quiet || git commit -m "NAS: Evaluated ${{ matrix.architecture_type }} [$(date +'%Y-%m-%d')]" || true
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
