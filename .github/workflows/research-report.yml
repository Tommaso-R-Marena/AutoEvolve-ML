name: Research Report (Weekly)

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 4 AM
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install minimal dependencies
      run: |
        pip install numpy
    
    - name: Generate research report
      id: report
      run: |
        python -c "
import sys
import json
import os
from datetime import datetime
sys.path.insert(0, '.')

try:
    from research_automation import ResearchAutomation
    
    ra = ResearchAutomation()
    ra.load_research_state()
    
    report = ra.generate_research_report()
    
    with open('weekly_research_report.json', 'w') as f:
        json.dump(report, f, indent=2)
    
    print(f'BREAKTHROUGHS={report.get(\"breakthroughs\", 0)}' >> '$GITHUB_OUTPUT')
    print(f'EXPERIMENTS={report.get(\"total_experiments\", 0)}' >> '$GITHUB_OUTPUT')
    
    print('Research report generated')
    print(f'Total experiments: {report.get(\"total_experiments\", 0)}')
    print(f'Breakthroughs: {report.get(\"breakthroughs\", 0)}')
except Exception as e:
    print(f'Research report skipped: {e}')
    print('BREAKTHROUGHS=0' >> '$GITHUB_OUTPUT')
    print('EXPERIMENTS=0' >> '$GITHUB_OUTPUT')
" 2>&1 | tee report_output.txt
        
        # Extract outputs from file
        if grep -q 'BREAKTHROUGHS=' report_output.txt; then
          grep 'BREAKTHROUGHS=' report_output.txt | cut -d'=' -f2 > /tmp/breakthroughs
          echo "BREAKTHROUGHS=$(cat /tmp/breakthroughs)" >> $GITHUB_OUTPUT
        else
          echo "BREAKTHROUGHS=0" >> $GITHUB_OUTPUT
        fi
        
        if grep -q 'EXPERIMENTS=' report_output.txt; then
          grep 'EXPERIMENTS=' report_output.txt | cut -d'=' -f2 > /tmp/experiments
          echo "EXPERIMENTS=$(cat /tmp/experiments)" >> $GITHUB_OUTPUT
        else
          echo "EXPERIMENTS=0" >> $GITHUB_OUTPUT
        fi
    
    - name: Create breakthrough issue
      if: steps.report.outputs.BREAKTHROUGHS != '0'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const report = JSON.parse(fs.readFileSync('weekly_research_report.json', 'utf8'));
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎉 ${report.breakthroughs} Breakthrough(s) Discovered This Week!`,
              body: `## Weekly Research Report\n\n**Total Experiments**: ${report.total_experiments}\n**Completed**: ${report.completed_experiments}\n**Breakthroughs**: ${report.breakthroughs}\n**Average Improvement**: ${report.avg_improvement.toFixed(2)}%\n\n### Top Improvements\n${JSON.stringify(report.best_improvements, null, 2)}\n\n---\n*Automated research report generated on ${new Date().toISOString()}*`,
              labels: ['breakthrough', 'automated']
            });
          } catch (e) {
            console.log('Could not create issue:', e);
          }
      continue-on-error: true
    
    - name: Commit research report
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add weekly_research_report.json || true
        git diff --staged --quiet || git commit -m "Research: Weekly report [$(date +'%Y-%m-%d')]" || true
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
