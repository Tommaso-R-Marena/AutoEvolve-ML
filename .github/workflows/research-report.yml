name: Research Report (Weekly)

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install minimal dependencies
      run: pip install numpy
    
    - name: Generate research report
      id: report
      run: |
        python scripts/research_gen.py
        
        if [ -f report_metrics.txt ]; then
          while IFS='=' read -r key value; do
            echo "$key=$value" >> $GITHUB_OUTPUT
          done < report_metrics.txt
        else
          echo "BREAKTHROUGHS=0" >> $GITHUB_OUTPUT
          echo "EXPERIMENTS=0" >> $GITHUB_OUTPUT
        fi
    
    - name: Create breakthrough issue
      if: steps.report.outputs.BREAKTHROUGHS != '0'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const report = JSON.parse(fs.readFileSync('weekly_research_report.json', 'utf8'));
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎉 ${report.breakthroughs} Breakthrough(s) Discovered This Week!`,
              body: `## Weekly Research Report\n\n**Total Experiments**: ${report.total_experiments}\n**Completed**: ${report.completed_experiments}\n**Breakthroughs**: ${report.breakthroughs}\n**Average Improvement**: ${report.avg_improvement.toFixed(2)}%\n\n### Top Improvements\n${JSON.stringify(report.best_improvements, null, 2)}\n\n---\n*Automated research report generated on ${new Date().toISOString()}*`,
              labels: ['breakthrough', 'automated']
            });
          } catch (e) {
            console.log('Could not create issue:', e);
          }
      continue-on-error: true
    
    - name: Commit research report
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add weekly_research_report.json || true
        git diff --staged --quiet || git commit -m "Research: Weekly report [$(date +'%Y-%m-%d')]" || true
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
