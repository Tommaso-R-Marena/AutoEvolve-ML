name: Meta-Learning Update (Daily)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  meta-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install minimal dependencies
      run: pip install numpy
    
    - name: Analyze meta-learning performance
      run: python scripts/meta_analyze.py
    
    - name: Commit meta-learning report
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add meta_learning_report.json || true
        git diff --staged --quiet || git commit -m "Meta-learning: Daily update [$(date +'%Y-%m-%d')]" || true
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
