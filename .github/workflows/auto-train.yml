name: Auto-Train Self-Improving Model

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'train.py'
      - 'data_sources.py'
      - '*.py'
      - 'requirements.txt'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
      continue-on-error: false
    
    - name: Configure Git LFS
      run: |
        git lfs install
        git lfs track "*.db" || true
        git lfs track "*.parquet" || true
        git lfs track "data/chunks/*.parquet" || true
      continue-on-error: true
    
    - name: Run training (optimized for time)
      id: train
      run: |
        python train.py
        TRAIN_EXIT=$?
        
        echo "Training exit code: $TRAIN_EXIT"
        
        if [ $TRAIN_EXIT -ne 0 ]; then
          echo "TRAINING_FAILED=true" >> $GITHUB_OUTPUT
          echo "IMPROVEMENT=0" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        echo "TRAINING_FAILED=false" >> $GITHUB_OUTPUT
        
        if [ -f "improvement_metrics.json" ]; then
          IMPROVEMENT=$(python scripts/extract_improvement.py 2>/dev/null || echo "0")
          echo "IMPROVEMENT=$IMPROVEMENT" >> $GITHUB_OUTPUT
          echo "Performance improvement: $IMPROVEMENT%"
        else
          echo "IMPROVEMENT=0" >> $GITHUB_OUTPUT
        fi
      continue-on-error: true
    
    - name: Commit significant improvements
      if: steps.train.outputs.TRAINING_FAILED != 'true' && steps.train.outputs.IMPROVEMENT != '0'
      run: |
        IMPROVEMENT="${{ steps.train.outputs.IMPROVEMENT }}"
        THRESHOLD=3.0
        
        SHOULD_COMMIT=$(python scripts/check_threshold.py "$IMPROVEMENT" "$THRESHOLD" || echo "false")
        
        if [ "$SHOULD_COMMIT" = "true" ]; then
          echo "🎉 Significant improvement: ${IMPROVEMENT}%"
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add -A || true
          git diff --staged --quiet || git commit -m "⚡ Significant improvement: ${IMPROVEMENT}% [$(date +'%Y-%m-%d %H:%M')]" || true
          git push || echo "Push failed"
          
          echo "AUTO_COMMITTED=true" >> $GITHUB_ENV
        else
          echo "AUTO_COMMITTED=false" >> $GITHUB_ENV
        fi
      continue-on-error: true
    
    - name: Standard commit
      if: env.AUTO_COMMITTED != 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A || true
        git diff --staged --quiet || git commit -m "Auto-train: Update [$(date +'%Y-%m-%d %H:%M')]" || true
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: training-${{ github.run_number }}
        path: |
          *.pth
          *.json
        retention-days: 7
      continue-on-error: true
    
    - name: Report usage
      if: always()
      run: |
        echo "Workflow completed in job"
        echo "Estimated minutes used: ~20-25 minutes"
