name: Auto-Train Self-Improving Model

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'train.py'
      - 'requirements.txt'

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Configure Git LFS
      run: |
        git lfs install
        git lfs track "*.db"
        git lfs track "*.parquet"
        git lfs track "data/chunks/*.parquet"
    
    - name: Run tests before training
      run: |
        python -m pytest tests/ -v
    
    - name: Run training with auto-save
      id: train
      run: |
        python train.py
        
        # Check if significant improvement was made
        if [ -f "improvement_metrics.json" ]; then
          IMPROVEMENT=$(python -c "import json; data=json.load(open('improvement_metrics.json')); print(data.get('improvement_percentage', 0))")
          echo "IMPROVEMENT=$IMPROVEMENT" >> $GITHUB_OUTPUT
          echo "Performance improvement: $IMPROVEMENT%"
        else
          echo "IMPROVEMENT=0" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit significant improvements immediately
      if: steps.train.outputs.IMPROVEMENT != '0'
      run: |
        IMPROVEMENT="${{ steps.train.outputs.IMPROVEMENT }}"
        THRESHOLD=3.0  # 3% improvement threshold for immediate commit
        
        SHOULD_COMMIT=$(python -c "print('true' if float('$IMPROVEMENT') >= $THRESHOLD else 'false')")
        
        if [ "$SHOULD_COMMIT" = "true" ]; then
          echo "🎉 Significant improvement detected: ${IMPROVEMENT}% - Auto-committing immediately"
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add all training artifacts
          git add model_checkpoint.pth metrics.json training_state.json improvement_metrics.json
          git add data/chunks/*.parquet || true
          git add data/database_metadata.json || true
          
          git commit -m "⚡ Significant improvement: ${IMPROVEMENT}% gain [$(date +'%Y-%m-%d %H:%M:%S UTC')]" -m "Auto-committed due to exceeding ${THRESHOLD}% improvement threshold"
          git push
          
          echo "AUTO_COMMITTED=true" >> $GITHUB_ENV
        else
          echo "Improvement ${IMPROVEMENT}% below ${THRESHOLD}% threshold - standard commit"
          echo "AUTO_COMMITTED=false" >> $GITHUB_ENV
        fi
    
    - name: Evaluate if self-modification needed
      id: self_modify
      run: |
        python self_modifier.py
        
        if [ -f "modification_proposal.json" ]; then
          echo "NEEDS_MODIFICATION=true" >> $GITHUB_OUTPUT
        else
          echo "NEEDS_MODIFICATION=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Create self-modification PR
      if: steps.self_modify.outputs.NEEDS_MODIFICATION == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const proposal = JSON.parse(fs.readFileSync('modification_proposal.json', 'utf8'));
          
          const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
          const branchName = `auto-modify-${timestamp}`;
          
          const { data: ref } = await github.rest.git.getRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: 'heads/main'
          });
          
          await github.rest.git.createRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: `refs/heads/${branchName}`,
            sha: ref.object.sha
          });
          
          for (const file of proposal.files) {
            const content = Buffer.from(file.content).toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: file.path,
              message: `Self-modification: ${file.reason}`,
              content: content,
              branch: branchName
            });
          }
          
          const { data: pr } = await github.rest.pulls.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🤖 Self-Modification: ${proposal.title}`,
            head: branchName,
            base: 'main',
            body: `## Automated Self-Modification\n\n${proposal.description}\n\n### Changes\n${proposal.files.map(f => `- **${f.path}**: ${f.reason}`).join('\n')}\n\n### Metrics\n- **Performance improvement**: ${(proposal.expected_improvement * 100).toFixed(2)}%\n- **Confidence**: ${(proposal.confidence * 100).toFixed(1)}%\n\n---\n*This PR was automatically generated by the self-improving model.*`
          });
    
    - name: Commit and push model weights (standard commit)
      if: env.AUTO_COMMITTED != 'true' && steps.self_modify.outputs.NEEDS_MODIFICATION == 'false'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add model_checkpoint.pth metrics.json training_state.json
        git add data/chunks/*.parquet || true
        git add data/database_metadata.json || true
        
        git diff --staged --quiet || git commit -m "Auto-train: Update model weights [$(date +'%Y-%m-%d %H:%M:%S UTC')]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload training artifacts
      uses: actions/upload-artifact@v4
      with:
        name: training-results-${{ github.run_number }}
        path: |
          model_checkpoint.pth
          metrics.json
          training_state.json
          improvement_metrics.json
          data/database_metadata.json
        retention-days: 30
